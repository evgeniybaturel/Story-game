<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Общая история</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            touch-action: manipulation;
        }

        #app {
            max-width: 480px;
            width: 100%;
            background: #14141e;
            border-radius: 28px;
            padding: 24px 20px 32px;
            box-shadow: 0 0 40px rgba(100, 60, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.04);
            min-height: 600px;
            display: flex;
            flex-direction: column;
            transition: all 0.3s;
        }

        .hidden {
            display: none !important;
        }

        /* ===== СТАРТОВЫЙ ЭКРАН ===== */
        #start-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            gap: 20px;
            padding: 10px 0;
        }

        #start-screen h1 {
            font-size: 38px;
            font-weight: 700;
            background: linear-gradient(135deg, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        #start-screen .sub {
            color: #8888aa;
            font-size: 16px;
            margin-top: -8px;
            line-height: 1.5;
        }

        .input-group {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 10px 0;
        }

        .input-group input {
            background: #1e1e2e;
            border: 1px solid #2a2a40;
            border-radius: 14px;
            padding: 14px 18px;
            font-size: 18px;
            color: #e0e0e0;
            outline: none;
            width: 100%;
            transition: border 0.2s;
        }

        .input-group input:focus {
            border-color: #7c5cfc;
        }

        .input-group input::placeholder {
            color: #555577;
        }

        .btn {
            background: linear-gradient(135deg, #7c5cfc, #5b3fd4);
            border: none;
            border-radius: 16px;
            padding: 16px 24px;
            font-size: 20px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.15s;
            touch-action: manipulation;
            user-select: none;
            width: 100%;
            text-align: center;
            box-shadow: 0 4px 20px rgba(100, 60, 255, 0.25);
        }

        .btn:active {
            transform: scale(0.96);
            opacity: 0.8;
        }

        .btn-secondary {
            background: #1e1e2e;
            box-shadow: none;
            border: 1px solid #2a2a40;
            color: #aaaacc;
        }

        .btn-secondary:active {
            background: #2a2a40;
        }

        .btn-success {
            background: linear-gradient(135deg, #34d399, #059669);
            box-shadow: 0 4px 20px rgba(52, 211, 153, 0.2);
        }

        /* ===== ИГРОВОЙ ЭКРАН ===== */
        #game-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        #game-screen .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 12px;
            border-bottom: 1px solid #1e1e2e;
        }

        #game-screen .step-counter {
            color: #666688;
            font-size: 14px;
            background: #1a1a28;
            padding: 6px 14px;
            border-radius: 20px;
        }

        #game-screen .status {
            color: #8888bb;
            font-size: 13px;
            padding: 4px 12px;
            border-radius: 12px;
            background: #1a1a28;
        }

        #game-screen .phase-badge {
            background: linear-gradient(135deg, #7c5cfc20, #5b3fd420);
            color: #a78bfa;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            border: 1px solid #2a2a50;
        }

        #game-screen .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 14px;
            min-height: 280px;
            justify-content: center;
        }

        #game-screen .content .label {
            color: #666688;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        #game-screen .content .text {
            font-size: 24px;
            line-height: 1.5;
            font-weight: 500;
            color: #f0f0f5;
            padding: 8px 0;
            word-break: break-word;
        }

        #game-screen .content .text-small {
            font-size: 18px;
            color: #c0c0dd;
        }

        #game-screen .content .text-muted {
            color: #8888aa;
            font-size: 16px;
            font-weight: 400;
        }

        #game-screen .content .divider {
            height: 1px;
            background: #1e1e2e;
            margin: 6px 0;
        }

        /* Кнопки в игре */
        #game-screen .actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 8px;
        }

        #game-screen .actions .btn {
            font-size: 18px;
            padding: 14px;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #2a2a50;
            box-shadow: none;
            color: #aaaacc;
        }

        .btn-outline:active {
            background: #1a1a28;
        }

        /* ===== ФИНАЛЬНЫЙ ЭКРАН ===== */
        #final-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding: 10px 0;
        }

        #final-screen .title {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.2;
        }

        #final-screen .story-text {
            background: #1a1a28;
            border-radius: 16px;
            padding: 18px;
            font-size: 16px;
            line-height: 1.7;
            color: #d0d0e8;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #1e1e2e;
            white-space: pre-wrap;
        }

        #final-screen .stats {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        #final-screen .stats .stat {
            background: #1a1a28;
            padding: 10px 16px;
            border-radius: 12px;
            font-size: 14px;
            color: #8888bb;
            border: 1px solid #1e1e2e;
            flex: 1;
            min-width: 80px;
            text-align: center;
        }

        #final-screen .stats .stat span {
            display: block;
            color: #e0e0f0;
            font-size: 22px;
            font-weight: 600;
            margin-top: 4px;
        }

        /* Анимация загрузки */
        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #2a2a50;
            border-top-color: #7c5cfc;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 10px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Адаптив */
        @media (max-width: 420px) {
            #app {
                padding: 16px 14px 24px;
                border-radius: 20px;
                min-height: 500px;
            }
            #start-screen h1 {
                font-size: 30px;
            }
            #game-screen .content .text {
                font-size: 20px;
            }
            #final-screen .title {
                font-size: 26px;
            }
            .btn {
                font-size: 17px;
                padding: 14px 20px;
            }
        }

        @media (min-width: 768px) {
            #app {
                padding: 40px 36px 48px;
                min-height: 700px;
            }
            #game-screen .content .text {
                font-size: 28px;
            }
        }

        /* Скролл */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #14141e;
        }
        ::-webkit-scrollbar-thumb {
            background: #2a2a50;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div id="app">

        <!-- ===== СТАРТОВЫЙ ЭКРАН ===== -->
        <div id="start-screen">
            <h1>📖 Общая история</h1>
            <p class="sub">Кооперативная игра для прогулок.<br>Обсуждайте, фантазируйте, создавайте историю вместе.</p>

            <div class="input-group">
                <input type="text" id="player1-name" placeholder="Имя игрока 1" value="Аня">
                <input type="text" id="player2-name" placeholder="Имя игрока 2" value="Макс">
            </div>

            <button class="btn" id="start-btn">🚀 Начать историю</button>
            <button class="btn btn-secondary" id="load-btn" style="display:none;">📂 Продолжить сохранённую</button>
        </div>

        <!-- ===== ИГРОВОЙ ЭКРАН ===== -->
        <div id="game-screen" class="hidden">
            <div class="header">
                <span class="step-counter" id="step-counter">Шаг 1 / 8</span>
                <span class="status" id="status-badge">💬 Обсуждение</span>
            </div>

            <div class="phase-badge" id="phase-badge">📌 Завязка</div>

            <div class="content" id="content-area">
                <div class="label" id="content-label">Задание</div>
                <div class="text" id="content-text">Загрузка...</div>
            </div>

            <div class="actions" id="actions-area">
                <button class="btn" id="next-btn">✅ Обсудили!</button>
                <button class="btn btn-secondary" id="final-btn">🏁 Завершить историю</button>
            </div>
        </div>

        <!-- ===== ФИНАЛЬНЫЙ ЭКРАН ===== -->
        <div id="final-screen" class="hidden">
            <div class="title" id="final-title">Название истории</div>
            <div class="story-text" id="final-story">Текст истории...</div>
            <div class="stats">
                <div class="stat">Шагов <span id="final-steps">0</span></div>
                <div class="stat">Поворотов <span id="final-twists">0</span></div>
            </div>
            <button class="btn btn-success" id="copy-btn">📋 Скопировать историю</button>
            <button class="btn btn-secondary" id="restart-btn">🔄 Начать новую</button>
        </div>

    </div>

    <script>
        // ============================================================
        // 1. БАЗА ДАННЫХ (завязки, вопросы, задания)
        // ============================================================

        const OPENINGS = [
            "Ты находишь старое письмо в дупле дерева, но оно написано на неизвестном языке...",
            "Вход в парк перекрыт, но охранник шепчет: 'Только не ходите к старому фонтану'…",
            "Твой сосед исчез три дня назад, а сегодня ты видишь его в толпе с чемоданом…",
            "На чердаке бабушкиного дома ты находишь карту с пометкой 'Не открывать до полнолуния'",
            "В кафе официант случайно роняет записку: 'Они уже близко. Сожги это'",
            "Ты покупаешь книгу в букинистическом, а между страниц — фотография, где ты стоишь на этом же месте, но 50 лет назад",
            "Ночью тебе звонит неизвестный номер и говорит: 'Ты должен прийти на стадион. Времени мало'",
            "В новой квартире ты находишь тайную комнату, где стены покрыты иероглифами",
            "На пляже волны выносят бутылку с запиской, но язык тебе незнаком, а подпись — твоя",
            "В метро незнакомец передаёт тебе ключ и шепчет: 'Откроешь — изменишь всё'"
        ];

        const QUESTIONS = [
            { type: 'question', text: 'Кто главный герой? Какое у него имя и чем он занимается?' },
            { type: 'question', text: 'Какое время года в этой истории? Опишите погоду' },
            { type: 'question', text: 'Что самое странное в этом месте или ситуации?' },
            { type: 'question', text: 'Какая у героя мечта или цель?' },
            { type: 'question', text: 'Что герой носит в карманах?' },
            { type: 'question', text: 'Есть ли у героя спутник или друг?' },
            { type: 'question', text: 'Что герой чувствует в этот момент?' },
            { type: 'question', text: 'Какое животное могло бы появиться в этой истории?' }
        ];

        const TASKS = [
            { type: 'task', text: 'Опишите звук, который вы слышите вокруг' },
            { type: 'task', text: 'Используйте слово "стеклянный" в своём описании' },
            { type: 'task', text: 'Добавьте неожиданный запах в сцену' },
            { type: 'task', text: 'Опишите, что герой видит за окном' },
            { type: 'task', text: 'Используйте слово "серебряный" в описании' },
            { type: 'task', text: 'Что происходит, когда герой закрывает глаза?' },
            { type: 'task', text: 'Опишите текстуру предмета, который герой трогает' },
            { type: 'task', text: 'Добавьте элемент, который не может существовать в реальном мире' }
        ];

        // Повороты для ИИ (запасные, если API не ответит)
        const FALLBACK_TWISTS = [
            'Внезапно начинается ливень, и всё вокруг меняется',
            'Герой замечает, что за ним кто-то следит',
            'Из ниоткуда появляется старая знакомая',
            'В кармане находится предмет, который меняет всё',
            'Герой слышит голос, который говорит ему, что делать',
            'Ситуация оказывается совсем не тем, чем казалась',
            'Герой находит скрытый проход',
            'Время начинает идти задом наперёд'
        ];

        // ============================================================
        // 2. СОСТОЯНИЕ ИГРЫ
        // ============================================================

        let state = {
            step: 0,
            totalSteps: 8,
            story: [], // массив объектов { type, text, answer }
            players: ['Игрок 1', 'Игрок 2'],
            currentQuestion: null,
            isGenerating: false,
            historyId: Date.now()
        };

        // ============================================================
        // 3. DOM-элементы
        // ============================================================

        const startScreen = document.getElementById('start-screen');
        const gameScreen = document.getElementById('game-screen');
        const finalScreen = document.getElementById('final-screen');

        const p1Input = document.getElementById('player1-name');
        const p2Input = document.getElementById('player2-name');
        const startBtn = document.getElementById('start-btn');
        const loadBtn = document.getElementById('load-btn');

        const stepCounter = document.getElementById('step-counter');
        const statusBadge = document.getElementById('status-badge');
        const phaseBadge = document.getElementById('phase-badge');
        const contentLabel = document.getElementById('content-label');
        const contentText = document.getElementById('content-text');
        const nextBtn = document.getElementById('next-btn');
        const finalBtn = document.getElementById('final-btn');

        const finalTitle = document.getElementById('final-title');
        const finalStory = document.getElementById('final-story');
        const finalSteps = document.getElementById('final-steps');
        const finalTwists = document.getElementById('final-twists');
        const copyBtn = document.getElementById('copy-btn');
        const restartBtn = document.getElementById('restart-btn');

        // ============================================================
        // 4. ИГРОВАЯ ЛОГИКА
        // ============================================================

        // Перемешиваем массив
        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // Получить случайный элемент
        function random(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        // Инициализация игры
        function initGame() {
            const name1 = p1Input.value.trim() || 'Игрок 1';
            const name2 = p2Input.value.trim() || 'Игрок 2';
            state.players = [name1, name2];
            state.step = 0;
            state.story = [];

            // Выбираем завязку
            const opening = random(OPENINGS);
            state.story.push({ type: 'opening', text: opening, answer: '' });

            // Перемешиваем вопросы и задания
            const allPhases = [];
            const shuffledQuestions = shuffle([...QUESTIONS]);
            const shuffledTasks = shuffle([...TASKS]);

            // Берём по 4 вопроса и 4 задания (итого 8 шагов)
            for (let i = 0; i < 4; i++) {
                if (shuffledQuestions[i]) allPhases.push(shuffledQuestions[i]);
                if (shuffledTasks[i]) allPhases.push(shuffledTasks[i]);
            }

            // Перемешиваем фазы
            state.phases = shuffle(allPhases).slice(0, state.totalSteps);

            // Добавляем запасные, если мало
            while (state.phases.length < state.totalSteps) {
                const pool = [...QUESTIONS, ...TASKS];
                state.phases.push(random(pool));
            }

            state.currentPhase = 0;
            state.storyId = Date.now();

            // Сохраняем в localStorage
            saveState();

            // Показываем первый шаг
            showStep();
            showGameScreen();
        }

        // Показать текущий шаг
        function showStep() {
            const phase = state.phases[state.currentPhase];
            if (!phase) {
                finishStory();
                return;
            }

            const stepNum = state.currentPhase + 1;
            stepCounter.textContent = `Шаг ${stepNum} / ${state.totalSteps}`;

            if (phase.type === 'question') {
                statusBadge.textContent = '💬 Обсуждение';
                phaseBadge.textContent = '❓ Вопрос';
                contentLabel.textContent = 'Обсудите вместе и найдите ответ';
            } else {
                statusBadge.textContent = '🎨 Творчество';
                phaseBadge.textContent = '✍️ Задание';
                contentLabel.textContent = 'Придумайте описание вместе';
            }

            contentText.textContent = phase.text;
            state.currentQuestion = phase;
        }

        // Переход к следующему шагу
        function nextStep() {
            if (state.isGenerating) return;

            // Сохраняем ответ (устный, мы не за
