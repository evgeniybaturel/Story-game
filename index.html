<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Детектив на прогулке</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="app">

        <!-- СТАРТОВЫЙ ЭКРАН -->
        <div id="start-screen">
            <h1>Детектив на прогулке</h1>
            <p class="sub">Интерактивное расследование. Гуляйте, ищите улики, раскрывайте тайну.</p>

            <div class="input-group">
                <input type="text" id="player1-name" placeholder="Имя игрока 1" value="Аня">
                <input type="text" id="player2-name" placeholder="Имя игрока 2" value="Макс">
            </div>

            <button class="btn" id="start-btn">Начать расследование</button>
            <button class="btn btn-secondary" id="load-btn" style="display:none;">Продолжить сохранённое</button>
        </div>

        <!-- ИГРОВОЙ ЭКРАН -->
        <div id="game-screen" class="hidden">
            <div class="header">
                <span class="step-counter" id="step-counter">Шаг 1</span>
                <span class="status" id="status-badge">Завязка</span>
            </div>

            <div class="content" id="content-area">
                <div class="label" id="content-label">Ситуация</div>
                <div class="text" id="content-text">Загрузка...</div>
            </div>

            <div class="history" id="history-area">
                <div class="history-label">Журнал улик</div>
                <div class="history-items" id="history-items"></div>
            </div>

            <div class="actions">
                <button class="btn" id="next-btn">Обсудили</button>
                <button class="btn btn-secondary" id="version-btn">Выдвинуть версию</button>
                <button class="btn btn-secondary" id="final-btn">Сдаться</button>
            </div>
        </div>

        <!-- ФИНАЛЬНЫЙ ЭКРАН -->
        <div id="final-screen" class="hidden">
            <div class="title" id="final-title">Дело раскрыто</div>
            <div class="story-text" id="final-story">Текст...</div>
            <div class="stats">
                <div class="stat">Шагов <span id="final-steps">0</span></div>
                <div class="stat">Улик <span id="final-clues">0</span></div>
            </div>
            <button class="btn btn-success" id="copy-btn">Скопировать</button>
            <button class="btn btn-secondary" id="restart-btn">Новое дело</button>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
