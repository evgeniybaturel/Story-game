<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Общая история с ИИ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            touch-action: manipulation;
        }
        #app {
            max-width: 480px;
            width: 100%;
            background: #14141e;
            border-radius: 28px;
            padding: 24px 20px 32px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            min-height: 600px;
            display: flex;
            flex-direction: column;
        }
        .hidden {
            display: none !important;
        }
        #start-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            gap: 20px;
        }
        #start-screen h1 {
            font-size: 38px;
            font-weight: 700;
            background: linear-gradient(135deg, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        #start-screen .sub {
            color: #8888aa;
            font-size: 16px;
            line-height: 1.5;
        }
        .input-group {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .input-group input {
            background: #1e1e2e;
            border: 1px solid #2a2a40;
            border-radius: 14px;
            padding: 14px 18px;
            font-size: 18px;
            color: #e0e0e0;
            outline: none;
            width: 100%;
        }
        .btn {
            background: linear-gradient(135deg, #7c5cfc, #5b3fd4);
            border: none;
            border-radius: 16px;
            padding: 16px 24px;
            font-size: 20px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            width: 100%;
            text-align: center;
            touch-action: manipulation;
        }
        .btn:active {
            transform: scale(0.96);
            opacity: 0.8;
        }
        .btn-secondary {
            background: #1e1e2e;
            border: 1px solid #2a2a40;
            color: #aaaacc;
        }
        .btn-success {
            background: linear-gradient(135deg, #34d399, #059669);
        }
        #game-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        #game-screen .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 12px;
            border-bottom: 1px solid #1e1e2e;
        }
        #game-screen .step-counter {
            color: #666688;
            font-size: 14px;
            background: #1a1a28;
            padding: 6px 14px;
            border-radius: 20px;
        }
        #game-screen .status {
            color: #8888bb;
            font-size: 13px;
            padding: 4px 12px;
            border-radius: 12px;
            background: #1a1a28;
        }
        #game-screen .phase-badge {
            background: linear-gradient(135deg, #7c5cfc20, #5b3fd420);
            color: #a78bfa;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            border: 1px solid #2a2a50;
        }
        #game-screen .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 14px;
            min-height: 280px;
            justify-content: center;
        }
        #game-screen .content .label {
            color: #666688;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }
        #game-screen .content .text {
            font-size: 24px;
            line-height: 1.5;
            font-weight: 500;
            color: #f0f0f5;
            padding: 8px 0;
            word-break: break-word;
        }
        #game-screen .actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        #final-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        #final-screen .title {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.2;
        }
        #final-screen .story-text {
            background: #1a1a28;
            border-radius: 16px;
            padding: 18px;
            font-size: 16px;
            line-height: 1.7;
            color: #d0d0e8;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #1e1e2e;
            white-space: pre-wrap;
        }
        #final-screen .stats {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        #final-screen .stats .stat {
            background: #1a1a28;
            padding: 10px 16px;
            border-radius: 12px;
            font-size: 14px;
            color: #8888bb;
            border: 1px solid #1e1e2e;
            flex: 1;
            min-width: 80px;
            text-align: center;
        }
        #final-screen .stats .stat span {
            display: block;
            color: #e0e0f0;
            font-size: 22px;
            font-weight: 600;
            margin-top: 4px;
        }
        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #2a2a50;
            border-top-color: #7c5cfc;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 10px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @media (max-width: 420px) {
            #app { padding: 16px 14px 24px; min-height: 500px; }
            #start-screen h1 { font-size: 30px; }
            #game-screen .content .text { font-size: 20px; }
            #final-screen .title { font-size: 26px; }
            .btn { font-size: 17px; padding: 14px 20px; }
        }
    </style>
</head>
<body>

<div id="app">
    <!-- СТАРТ -->
    <div id="start-screen">
        <h1>📖 Общая история</h1>
        <p class="sub">Кооперативная игра для прогулок.<br>Обсуждайте, фантазируйте, создавайте историю вместе.</p>
        <div class="input-group">
            <input type="text" id="player1-name" placeholder="Имя игрока 1" value="Аня">
            <input type="text" id="player2-name" placeholder="Имя игрока 2" value="Макс">
        </div>
        <button class="btn" id="start-btn">🚀 Начать историю</button>
        <button class="btn btn-secondary" id="load-btn" style="display:none;">📂 Продолжить сохранённую</button>
    </div>

    <!-- ИГРА -->
    <div id="game-screen" class="hidden">
        <div class="header">
            <span class="step-counter" id="step-counter">Шаг 1 / 8</span>
            <span class="status" id="status-badge">💬 Обсуждение</span>
        </div>
        <div class="phase-badge" id="phase-badge">📌 Завязка</div>
        <div class="content">
            <div class="label" id="content-label">Задание</div>
            <div class="text" id="content-text">Загрузка...</div>
        </div>
        <div class="actions">
            <button class="btn" id="next-btn">✅ Обсудили!</button>
            <button class="btn btn-secondary" id="final-btn">🏁 Завершить историю</button>
        </div>
    </div>

    <!-- ФИНАЛ -->
    <div id="final-screen" class="hidden">
        <div class="title" id="final-title">Название истории</div>
        <div class="story-text" id="final-story">Текст истории...</div>
        <div class="stats">
            <div class="stat">Шагов <span id="final-steps">0</span></div>
            <div class="stat">Поворотов <span id="final-twists">0</span></div>
        </div>
        <button class="btn btn-success" id="copy-btn">📋 Скопировать историю</button>
        <button class="btn btn-secondary" id="restart-btn">🔄 Начать новую</button>
    </div>
</div>

<script>
// ============================================================
// 1. БАЗА ДАННЫХ
// ============================================================

const OPENINGS = [
    "Ты находишь старое письмо в дупле дерева, но оно написано на неизвестном языке...",
    "Вход в парк перекрыт, но охранник шепчет: 'Только не ходите к старому фонтану'…",
    "Твой сосед исчез три дня назад, а сегодня ты видишь его в толпе с чемоданом…",
    "На чердаке бабушкиного дома ты находишь карту с пометкой 'Не открывать до полнолуния'",
    "В кафе официант случайно роняет записку: 'Они уже близко. Сожги это'",
    "Ты покупаешь книгу в букинистическом, а между страниц — фотография, где ты стоишь на этом же месте, но 50 лет назад",
    "Ночью тебе звонит неизвестный номер и говорит: 'Ты должен прийти на стадион. Времени мало'",
    "В новой квартире ты находишь тайную комнату, где стены покрыты иероглифами",
    "На пляже волны выносят бутылку с запиской, но язык тебе незнаком, а подпись — твоя",
    "В метро незнакомец передаёт тебе ключ и шепчет: 'Откроешь — изменишь всё'"
];

const QUESTIONS = [
    { type: 'question', text: 'Кто главный герой? Какое у него имя и чем он занимается?' },
    { type: 'question', text: 'Какое время года в этой истории? Опишите погоду' },
    { type: 'question', text: 'Что самое странное в этом месте или ситуации?' },
    { type: 'question', text: 'Какая у героя мечта или цель?' },
    { type: 'question', text: 'Что герой носит в карманах?' },
    { type: 'question', text: 'Есть ли у героя спутник или друг?' },
    { type: 'question', text: 'Что герой чувствует в этот момент?' },
    { type: 'question', text: 'Какое животное могло бы появиться в этой истории?' }
];

const TASKS = [
    { type: 'task', text: 'Опишите звук, который вы слышите вокруг' },
    { type: 'task', text: 'Используйте слово "стеклянный" в своём описании' },
    { type: 'task', text: 'Добавьте неожиданный запах в сцену' },
    { type: 'task', text: 'Опишите, что герой видит за окном' },
    { type: 'task', text: 'Используйте слово "серебряный" в описании' },
    { type: 'task', text: 'Что происходит, когда герой закрывает глаза?' },
    { type: 'task', text: 'Опишите текстуру предмета, который герой трогает' },
    { type: 'task', text: 'Добавьте элемент, который не может существовать в реальном мире' }
];

const FALLBACK_TWISTS = [
    'Внезапно начинается ливень, и всё вокруг меняется',
    'Герой замечает, что за ним кто-то следит',
    'Из ниоткуда появляется старая знакомая',
    'В кармане находится предмет, который меняет всё',
    'Герой слышит голос, который говорит ему, что делать',
    'Ситуация оказывается совсем не тем, чем казалась',
    'Герой находит скрытый проход',
    'Время начинает идти задом наперёд'
];

// ============================================================
// 2. СОСТОЯНИЕ
// ============================================================

let state = {
    currentPhase: 0,
    totalSteps: 8,
    story: [],
    players: ['Игрок 1', 'Игрок 2'],
    phases: [],
    storyId: Date.now(),
    isTwistMode: false,
    isGenerating: false
};

// ============================================================
// 3. DOM
// ============================================================

const $ = id => document.getElementById(id);

const startScreen = $('start-screen');
const gameScreen = $('game-screen');
const finalScreen = $('final-screen');

const p1Input = $('player1-name');
const p2Input = $('player2-name');
const startBtn = $('start-btn');
const loadBtn = $('load-btn');

const stepCounter = $('step-counter');
const statusBadge = $('status-badge');
const phaseBadge = $('phase-badge');
const contentLabel = $('content-label');
const contentText = $('content-text');
const nextBtn = $('next-btn');
const finalBtn = $('final-btn');

const finalTitle = $('final-title');
const finalStory = $('final-story');
const finalSteps = $('final-steps');
const finalTwists = $('final-twists');
const copyBtn = $('copy-btn');
const restartBtn = $('restart-btn');

// ============================================================
// 4. ВСПОМОГАТЕЛЬНЫЕ
// ============================================================

function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

function random(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
}

// ============================================================
// 5. ОСНОВНАЯ ЛОГИКА
// ============================================================

function initGame() {
    console.log('🚀 Игра запускается...');
    
    const name1 = p1Input.value.trim() || 'Игрок 1';
    const name2 = p2Input.value.trim() || 'Игрок 2';
    state.players = [name1, name2];
    state.currentPhase = 0;
    state.story = [];
    state.storyId = Date.now();
    state.isTwistMode = false;
    state.isGenerating = false;

    // Завязка
    const opening = random(OPENINGS);
    state.story.push({ type: 'opening', text: opening, answer: '' });

    // Собираем фазы
    const allPhases = [];
    const shuffledQuestions = shuffle([...QUESTIONS]);
    const shuffledTasks = shuffle([...TASKS]);

    for (let i = 0; i < 4; i++) {
        if (shuffledQuestions[i]) allPhases.push(shuffledQuestions[i]);
        if (shuffledTasks[i]) allPhases.push(shuffledTasks[i]);
    }

    state.phases = shuffle(allPhases).slice(0, state.totalSteps);
    while (state.phases.length < state.totalSteps) {
        const pool = [...QUESTIONS, ...TASKS];
        state.phases.push(random(pool));
    }

    console.log('✅ Игра инициализирована, фаз:', state.phases.length);
    
    showGameScreen();
    showStep();
    saveState();
}

function showStep() {
    const phase = state.phases[state.currentPhase];
    if (!phase) {
        finishStory();
        return;
    }

    const stepNum = state.currentPhase + 1;
    stepCounter.textContent = `Шаг ${stepNum} / ${state.totalSteps}`;

    if (phase.type === 'question') {
        statusBadge.textContent = '💬 Обсуждение';
        phaseBadge.textContent = '❓ Вопрос';
        contentLabel.textContent = 'Обсудите вместе и найдите ответ';
    } else {
        statusBadge.textContent = '🎨 Творчество';
        phaseBadge.textContent = '✍️ Задание';
        contentLabel.textContent = 'Придумайте описание вместе';
    }

    contentText.textContent = phase.text;
    nextBtn.textContent = '✅ Обсудили!';
    state.isTwistMode = false;
    console.log('📌 Показан шаг:', stepNum);
}

async function generateTwist() {
    if (state.isGenerating) return;
    state.isGenerating = true;

    console.log('🌀 Генерируем поворот...');
    
    statusBadge.textContent = '🌀 Генерация...';
    phaseBadge.textContent = '⚡ Сюжетный поворот';
    contentLabel.textContent = 'ИИ придумывает неожиданный поворот';
    contentText.innerHTML = '<span class="loader"></span> Думаем...';
    nextBtn.disabled = true;

    try {
        const context = state.story
            .filter(s => s.answer)
            .map(s => `${s.text} → ${s.answer}`)
            .join('\n');

        const prompt = `
            Это история, которую мы сочиняем вместе.
            Вот что уже произошло:
            ${context || 'Пока ничего не произошло, только начало.'}

            Придумай НЕОЖИДАННЫЙ ПОВОРОТ СЮЖЕТА для этой истории.
            Поворот должен быть:
            - Интересным и небанальным
            - Логично вытекающим из контекста
            - Коротким (1-2 предложения)
            - Вдохновляющим для дальнейшего обсуждения

            Ответь ТОЛЬКО текстом поворота, без пояснений.
        `;

        const response = await fetch('https://text.pollinations.ai/openai', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                model: 'openai',
                messages: [
                    { role: 'system', content: 'Ты — креативный помощник для генерации сюжетных поворотов. Отвечай коротко и интересно.' },
                    { role: 'user', content: prompt }
                ],
                temperature: 0.9,
                max_tokens: 80
            })
        });

        let twistText = '';

        if (response.ok) {
            const data = await response.json();
            twistText = data.choices?.[0]?.message?.content || random(FALLBACK_TWISTS);
            console.log('✅ ИИ ответил:', twistText);
        } else {
            console.warn('⚠️ API вернул ошибку, используем запасной поворот');
            twistText = random(FALLBACK_TWISTS);
        }

        twistText = twistText.replace(/^["']|["']$/g, '').trim();

        state.story.push({
            type: 'twist',
            text: '🌀 Сюжетный поворот от ИИ',
            answer: twistText,
            timestamp: new Date().toISOString()
        });

        contentLabel.textContent = '🌀 Неожиданный поворот!';
        contentText.textContent = twistText;
        nextBtn.textContent = '🔥 Обсудили поворот!';
        nextBtn.disabled = false;
        statusBadge.textContent = '🎭 Поворот!';
        state.isTwistMode = true;

        saveState();

    } catch (error) {
        console.error('❌ Ошибка ИИ:', error);
        const fallback = random(FALLBACK_TWISTS);
        state.story.push({
            type: 'twist',
            text: '🌀 Сюжетный поворот (запасной)',
            answer: fallback,
            timestamp: new Date().toISOString()
        });
        contentLabel.textContent = '🌀 Поворот (офлайн)';
        contentText.textContent = fallback;
        nextBtn.textContent = '🔥 Обсудили!';
        nextBtn.disabled = false;
        statusBadge.textContent = '🎭 Поворот!';
        state.isTwistMode = true;
        saveState();
    }

    state.isGenerating = false;
}

function nextStep() {
    console.log('➡️ Нажата кнопка "Обсудили", isTwistMode:', state.isTwistMode);
    
    // Если это режим поворота — просто показываем следующий шаг
    if (state.isTwistMode) {
        state.isTwistMode = false;
        state.currentPhase++;
        if (state.currentPhase >= state.totalSteps) {
            finishStory();
        } else {
            showStep();
            saveState();
        }
        return;
    }

    // Сохраняем текущий шаг
    const phase = state.phases[state.currentPhase];
    if (phase) {
        state.story.push({
            type: phase.type,
            text: phase.text,
            answer: '✅ Обсуждено устно'
        });
    }

    state.currentPhase++;

    // Проверяем, нужно ли добавить поворот (каждый 2-й шаг)
    const shouldAddTwist = (state.currentPhase % 2 === 0) && 
                           state.currentPhase < state.totalSteps && 
                           state.currentPhase > 0;

    if (shouldAddTwist) {
        generateTwist();
        return;
    }

    if (state.currentPhase >= state.totalSteps) {
        finishStory();
    } else {
        showStep();
        saveState();
    }
}

function finishStory() {
    console.log('🏁 Завершаем историю');
    
    const storyParts
