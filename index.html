<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Детектив на прогулке</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="app">

        <!-- СТАРТОВЫЙ ЭКРАН -->
        <div id="start-screen">
            <h1>Детектив на прогулке</h1>
            <p class="sub">Расследуйте дело. Гуляйте. Общайтесь с ИИ-сыщиком.</p>
            <button class="btn" id="start-btn">Начать расследование</button>
            <button class="btn btn-secondary" id="load-btn" style="display:none;">Продолжить сохранённое</button>
        </div>

        <!-- ИГРОВОЙ ЭКРАН (ЧАТ) -->
        <div id="game-screen" class="hidden">
            <div class="chat-header">
                <span class="chat-title">Дело</span>
                <span class="chat-status" id="chat-status">● в процессе</span>
            </div>

            <div class="chat-messages" id="chat-messages">
                <!-- Сообщения будут появляться здесь -->
            </div>

            <div class="quick-actions" id="quick-actions">
                <button class="quick-btn" data-action="Осмотреть место">Осмотреть</button>
                <button class="quick-btn" data-action="Пойти к...">Пойти</button>
                <button class="quick-btn" data-action="Спросить">Спросить</button>
                <button class="quick-btn" data-action="Искать улики">Искать</button>
                <button class="quick-btn" data-action="Выдвинуть версию">Версия</button>
                <button class="quick-btn" data-action="Закончить расследование">Закончить</button>
            </div>

            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="Напишите действие или вопрос..." autocomplete="off">
                <button class="send-btn" id="send-btn">→</button>
            </div>
        </div>

        <!-- ФИНАЛЬНЫЙ ЭКРАН -->
        <div id="final-screen" class="hidden">
            <div class="title" id="final-title">Дело раскрыто</div>
            <div class="story-text" id="final-story">Текст...</div>
            <div class="stats">
                <div class="stat">Сообщений <span id="final-steps">0</span></div>
            </div>
            <button class="btn btn-success" id="copy-btn">Скопировать</button>
            <button class="btn btn-secondary" id="restart-btn">Новое дело</button>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
