<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Детектив на прогулке</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="app">

        <!-- СТАРТОВЫЙ ЭКРАН -->
        <div id="start-screen">
            <h1>Детектив на прогулке</h1>
            <p class="sub">Выберите режим игры и начните расследование</p>
            
            <div class="input-group">
                <input type="password" id="api-key" placeholder="API-ключ Groq (получить на console.groq.com)">
                <small>Ключ хранится только в вашем браузере</small>
            </div>

            <!-- ВЫБОР РЕЖИМА -->
            <div class="mode-selector">
                <button class="mode-btn active" id="mode-detective" data-mode="detective">🕵️ Детектив</button>
                <button class="mode-btn" id="mode-danetki" data-mode="danetki">❓ Данетки</button>
            </div>
            
            <button class="btn" id="start-btn">Начать расследование</button>
            <button class="btn btn-secondary" id="load-btn" style="display:none;">Продолжить сохранённое</button>
        </div>

        <!-- ИГРОВОЙ ЭКРАН (ЧАТ) -->
        <div id="game-screen" class="hidden">
            <div class="chat-header">
                <span class="chat-title" id="game-title">🕵️ Дело</span>
                <span class="chat-status" id="chat-status">● в процессе</span>
                <span class="chat-step" id="chat-step">Шаг 0</span>
                <button class="inventory-toggle" id="inventory-toggle">📦</button>
            </div>

            <div class="chat-messages" id="chat-messages">
                <!-- Сообщения будут появляться здесь -->
            </div>

            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="Напишите действие или вопрос..." autocomplete="off">
                <button class="send-btn" id="send-btn">→</button>
            </div>
        </div>

        <!-- МОДАЛЬНОЕ ОКНО (ИНВЕНТАРЬ) -->
        <div id="modal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <span class="modal-title">📦 Инвентарь</span>
                    <button class="modal-close" id="modal-close">✕</button>
                </div>
                <div class="modal-body" id="modal-body">
                    <!-- Улики будут здесь -->
                </div>
            </div>
        </div>

        <!-- ФИНАЛЬНЫЙ ЭКРАН -->
        <div id="final-screen" class="hidden">
            <div class="title" id="final-title">Дело раскрыто</div>
            <div class="story-text" id="final-story">Текст...</div>
            <div class="stats">
                <div class="stat">Сообщений <span id="final-steps">0</span></div>
            </div>
            <button class="btn btn-success" id="copy-btn">Скопировать</button>
            <button class="btn btn-secondary" id="restart-btn">Новое дело</button>
        </div>

    </div>

    <script src="api.js"></script>
    <script src="game.js"></script>
    <script src="ui.js"></script>
</body>
</html>
